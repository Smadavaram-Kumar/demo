name: API_CALLING

permissions:
  id-token: write
  contents: read
  
on:
  workflow_dispatch:
  
env:

  # -------------------------
  # SPN INFORMATION
  # -------------------------
  
  AZURE_TENANT_ID: ${{ secrets.PP_TENANT_ID }}
  AZURE_CLIENT_ID: ${{ secrets.PP_CLIENT_ID }}
  AZURE_CLIENT_SECRET: ${{ secrets.PP_CLIENT_SECRET }}

  
  # -------------------------
  # DEV AND TEST URL'S
  # -------------------------

  DEV_ENV_URL: 'https://org23b23f97.crm.dynamics.com'
  TEST_ENV_URL: 'https://orgd93932c9.crm.dynamics.com'

  # -------------------------
  # BASE AND TARGET URL'S
  # -------------------------

  #DEV_ENV_URL: 'https://org0d2311bd.crm.dynamics.com'     
  #TEST_ENV_URL: 'https://org5bef66f8.crm.dynamics.com'
  
  # -------------------------
  # FOLDERS THAT WILL GET CREATED DURING WORKFLOW RUN
  # -------------------------
  
  EXPORT_FOLDER: ./exported
  MANAGED_FOLDER: ./exported/managed
  UNMANAGED_FOLDER: ./exported/unmanaged
  UNPACKED_FOLDER: ./exported/unpacked

  SOLUTION_ZIP_NAME: ${{ github.event.inputs.solution_name }}.zip

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # -------------------------
      # SOURCE CONTROL CHECKOUT
      # -------------------------
      - name: Checkout  # PULLS THE REPO CODE INTO RUNNER  
        uses: actions/checkout@v5

      # -------------------------
      # INSTALL POWER PLATFORM CLI
      # -------------------------
      - name: Install Power Platform CLI # -INSTALLS THE CLI INTO RUNNER IN A TEMP FOLDER
        uses: microsoft/powerplatform-actions/actions-install@v1


      # -------------------------
      # ENSURE NEEDED FOLDERS EXIST
      # -------------------------
      - name: Ensure folders  # - CREATES FOLDERS
        run: |
          mkdir -p $EXPORT_FOLDER $MANAGED_FOLDER $UNPACKED_FOLDER      

          



      - name: Azure login (service principal)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
          enable-AzPSSession: false
          environment: azurecloud
          audience: api://AzureADTokenExchange
          auth-type: SERVICE_PRINCIPAL


      - name: service document 222 (Dataverse Web API)
        shell: bash
        run: |
          set -euo pipefail
          
          normalize_guid () {
            local g="$1"
            if [[ "$g" =~ ^[0-9a-fA-F]{32}$ ]]; then
              echo "${g:0:8}-${g:8:4}-${g:12:4}-${g:16:4}-${g:20:12}" | tr 'A-F' 'a-f'
            else
              echo "$g" | tr 'A-F' 'a-f'
            fi
          }
          
          base="https://orgd93932c9.crm.dynamics.com"
          cr_guid_raw="d2ebe7346b3d4d9eb7e2022e6c78f003"
          cr_guid="$(normalize_guid "$cr_guid_raw")"
          
          DV_TOKEN="$(az account get-access-token --resource "$base" --query accessToken -o tsv)"
          
          url="$base/api/data/v9.2/connectionreferences?\$select=connectionreferencelogicalname,createdon,_createdby_value,connectionid,connectionreferenceid&\$filter=connectionreferenceid%20eq%20${cr_guid}&\$expand=createdby(\$select=fullname,domainname,internalemailaddress)"
          
          echo "::group::Dataverse response (org2 raw)"
          http_code="$(curl -sS -o resp.json -w "%{http_code}" -H "Authorization: Bearer $DV_TOKEN" -H "Accept: application/json" "$url")"
          cat resp.json | jq . || cat resp.json
          echo "::endgroup::"
          
          if [[ "$http_code" != "200" ]]; then
            echo "Dataverse HTTP $http_code"
            exit 1
          fi
          
          cat resp.json | jq -r '.value[0].createdby.domainname // .value[0].createdby.internalemailaddress // "UPN not found"'



      - name: service document (Dataverse Web API)
        shell: bash
        run: |
          set -euo pipefail
          
          base="https://org23b23f97.crm.dynamics.com"
          crlname="new_sharedexcelonlinebusiness_3ff4e"
          
          DV_TOKEN="$(az account get-access-token --resource "$base" --query accessToken -o tsv)"
          
          url="$base/api/data/v9.2/connectionreferences?\$select=connectionreferencelogicalname,createdon,_createdby_value,connectionid&\$filter=connectionreferencelogicalname%20eq%20'${crlname}'&\$expand=createdby(\$select=fullname,domainname,internalemailaddress)"
          
          echo "::group::Dataverse response (raw)"
          resp="$(curl -fsS -H "Authorization: Bearer $DV_TOKEN" -H "Accept: application/json" "$url")"
          echo "$resp" | jq .
          echo "::endgroup::"

          echo "$resp" | jq -r '.value[0].createdby.domainname // .value[0].createdby.internalemailaddress // "UPN not found"'
         

          base="https://orgd93932c9.crm.dynamics.com"
          crlname="d2ebe7346b3d4d9eb7e2022e6c78f003"
          DV_TOKEN="$(az account get-access-token --resource "$base" --query accessToken -o tsv)"
          url="$base/api/data/v9.2/connectionreferences?\$select=connectionreferencelogicalname,createdon,_createdby_value,connectionid&\$filter=connectionid%20eq%20${crlname}&\$expand=createdby(\$select=fullname,domainname,internalemailaddress)"
          
          echo "::group::Dataverse response (raw)"
          resp="$(curl -fsS -H "Authorization: Bearer $DV_TOKEN" -H "Accept: application/json" "$url")"
          echo "$resp" | jq .
          echo "::endgroup::"

          echo "$resp" | jq -r '.value[0].createdby.domainname // .value[0].createdby.internalemailaddress // "UPN not found"'




          set -euo pipefail

          base="https://org23b23f97.crm.dynamics.com"
          TOKEN="$(az account get-access-token --resource "$base" --query accessToken -o tsv)"
          
          authz=(-H "Authorization: Bearer $TOKEN"
                 -H "Accept: application/json"
                 -H "OData-Version: 4.0"
                 -H "OData-MaxVersion: 4.0"
                 -H "If-None-Match: null")
          
          echo "Checking service document for entity sets..."
          curl -fsS "${authz[@]}" "$base/api/data/v9.2/" | jq -r '.value[].name' | grep -Ei 'aad|entra|microsoft' || true
          
          echo "Checking metadata for aaduser EntitySetName..."
          curl -fsS "${authz[@]}" \
            "$base/api/data/v9.2/EntityDefinitions?\$select=LogicalName,EntitySetName&\$filter=LogicalName%20eq%20%27aaduser%27" \
            | jq .


          echo "1) Show the 400 body (so we know which column is wrong):"
          curl -sS "${authz[@]}" \
            "$base/api/data/v9.2/aadusers?\$select=displayname,userprincipalname&\$top=1" \
            | jq . || true
          
          echo
          echo "2) List readable attribute logical names for aaduser (use these in \$select):"
          curl -fsS "${authz[@]}" \
            "$base/api/data/v9.2/EntityDefinitions(LogicalName='aaduser')/Attributes?\$select=LogicalName,IsValidForRead&\$filter=IsValidForRead%20eq%20true&\$top=2000" \
            | jq -r '.value[].LogicalName' | sort


          echo
          echo "3) Optional: Try grabbing one aadusers record (non-fatal):"
          resp="$(mktemp)"
          code="$(
            curl -sS -o "$resp" -w "%{http_code}" "${authz[@]}" \
              "$base/api/data/v9.2/aadusers?\$top=1" || true
          )"
          echo "HTTP=$code"
          if [[ "$code" == "200" ]]; then
            jq -r '.value[0] | keys[]' "$resp" | sort
          else
            cat "$resp" | jq . || cat "$resp"
          fi
          rm -f "$resp"
          
          echo
          echo "3) (Optional) Grab one record without \$select, inspect available keys:"
          curl -fsS "${authz[@]}" \
            "$base/api/data/v9.2/aadusers?\$top=1" \
            | jq -r '.value[0] | keys[]' | sort


      - name: Fetch Environment Variables (Dataverse Web API)
        shell: bash
        env:
          DATAVERSE_URL: ${{ env.DEV_ENV_URL }}
        run: |
          set -euo pipefail
      
          base="${{ env.DEV_ENV_URL }}"
          TOKEN="$(az account get-access-token --resource "$base" --query accessToken -o tsv)"
      
          fetch_paged () {
            local url="$1"
            local out="$2"
            local tmp
            tmp="$(mktemp)"
            : > "$tmp"
          
            while [[ -n "${url:-}" ]]; do
              resp="$(mktemp)"
          
              curl -fsS --retry 3 --retry-all-errors \
                -H "Authorization: Bearer $TOKEN" \
                -H "Accept: application/json" \
                -H "OData-Version: 4.0" \
                -H "OData-MaxVersion: 4.0" \
                -H "If-None-Match: null" \
                "$url" > "$resp"
          
              jq -c '.value[]' "$resp" >> "$tmp"
              url="$(jq -r '."@odata.nextLink" // empty' "$resp")"
              rm -f "$resp"
            done
          
            jq -s '{value: .}' "$tmp" > "$out"
            rm -f "$tmp"
          }
          
          fetch_paged \
            "$base/api/data/v9.2/aadusers?\$select=displayname,userprincipalname" \
            entraid.json
      
          echo "entra id values:"
          cat entraid.json
      
