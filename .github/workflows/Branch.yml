# Code Generated by Sidekick is for learning and experimentation purposes only.
name: List All Repository Branches

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  list-branches:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true

      - name: Pull all branch names
        id: get_branches
        shell: bash
        run: |
          # Code Generated by Sidekick is for learning and experimentation purposes only.
          BRANCHES=$(git ls-remote --heads origin | awk '{print $2}' | sed 's#refs/heads/##' | sort)

          echo "All branches in this repository:"
          echo "$BRANCHES"

          {
            echo "branch_names<<EOF"
            echo "$BRANCHES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Show branch output again
        shell: bash
        run: |
          # Code Generated by Sidekick is for learning and experimentation purposes only.
          echo "Branches from previous step:"
          echo "${{ steps.get_branches.outputs.branch_names }}"
