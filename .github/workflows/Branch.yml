# Code Generated by Sidekick is for learning and experimentation purposes only.
name: Checkout Latest Matching Branch

on:
  workflow_dispatch:
    inputs:
      branch_prefix:
        description: "Branch prefix, for example: sumanth"
        required: true
        default: "sumanth"

permissions:
  contents: read

jobs:
  checkout-latest-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Initial checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true

      - name: Find latest matching branch
        id: find_latest
        shell: bash
        run: |
          # Code Generated by Sidekick is for learning and experimentation purposes only.
          set -euo pipefail

          PREFIX="${{ inputs.branch_prefix }}"

          LATEST_BRANCH=$(
            git ls-remote --heads origin \
            | awk '{print $2}' \
            | sed 's#refs/heads/##' \
            | awk -v prefix="$PREFIX" '
                index($0, prefix "-") == 1 {
                  suffix = substr($0, length(prefix) + 2)
                  if (suffix ~ /^[0-9]{8}-[0-9]{4}$/) {
                    print $0
                  }
                }
              ' \
            | sort \
            | tail -n 1
          )

          if [ -z "$LATEST_BRANCH" ]; then
            echo "No branch found for prefix: $PREFIX"
            exit 1
          fi

          echo "Latest matching branch: $LATEST_BRANCH"

          echo "LATEST_BRANCH=$LATEST_BRANCH" >> "$GITHUB_ENV"
          echo "latest_branch=$LATEST_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Checkout latest branch
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.find_latest.outputs.latest_branch }}
          fetch-depth: 0
          lfs: true

      - name: Confirm checked out branch
        shell: bash
        run: |
          # Code Generated by Sidekick is for learning and experimentation purposes only.
          echo "Checked out branch: $LATEST_BRANCH"
          git branch --show-current
